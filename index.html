<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala Operacional · Revisão de Vidas 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════════════════ */
:root {
  --bg:          #0b1a20;
  --bg2:         #122430;
  --bg3:         #1a3040;
  --border:      rgba(115,234,254,0.1);
  --border-med:  rgba(115,234,254,0.2);
  --azul:        #24576a;
  --azul2:       #4b8495;
  --luz:         #73eafe;
  --luz-dim:     rgba(115,234,254,0.15);
  --claro:       #cfeaf1;
  --branco:      #f0fafd;
  --red:         #ff6b6b;
  --red-dim:     rgba(255,107,107,0.12);
  --yellow:      #ffc857;
  --green:       #5ce65c;

  --card-h:      30px;
  --cell-min-h:  80px;
  --sidebar-w:   220px;
  --header-h:    52px;
  --footer-h:    44px;
  --radius:      8px;
  --radius-lg:   12px;
  --transition:  0.15s ease;
}

/* ═══════════════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Montserrat', sans-serif;
  background: var(--bg);
  color: var(--branco);
  display: flex;
  flex-direction: column;
}

/* ═══════════════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════════════ */
#header {
  height: var(--header-h);
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 16px;
  flex-shrink: 0;
  z-index: 10;
}
#header h1 {
  font-size: 0.85rem;
  font-weight: 800;
  color: var(--luz);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  white-space: nowrap;
}
#header .subtitle {
  font-size: 0.65rem;
  color: var(--claro);
  opacity: 0.5;
  white-space: nowrap;
}
.header-sep { flex: 1; }

/* Search */
#search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
#search-wrap svg {
  position: absolute;
  left: 8px;
  color: var(--azul2);
  pointer-events: none;
}
#search-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px 5px 28px;
  font-family: 'Montserrat', sans-serif;
  font-size: 0.7rem;
  color: var(--branco);
  width: 180px;
  transition: border-color var(--transition), width var(--transition);
  outline: none;
}
#search-input:focus {
  border-color: var(--luz);
  width: 220px;
}
#search-input::placeholder { color: var(--azul2); }

/* Header Buttons */
.hbtn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--claro);
  font-family: 'Montserrat', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.hbtn:hover { border-color: var(--luz); color: var(--luz); }
.hbtn.danger:hover { border-color: var(--red); color: var(--red); }
.hbtn.primary { background: var(--luz); color: var(--bg); border-color: var(--luz); }
.hbtn.primary:hover { background: #90f1ff; }

/* ═══════════════════════════════════════════════════════════════
   CONFLICT BAR
═══════════════════════════════════════════════════════════════ */
#conflict-bar {
  background: var(--red-dim);
  border-bottom: 1px solid rgba(255,107,107,0.3);
  padding: 5px 16px;
  font-size: 0.68rem;
  color: var(--red);
  font-weight: 600;
  display: none;
  flex-shrink: 0;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
#conflict-bar.show { display: flex; }
#conflict-bar strong { opacity: 0.7; margin-right: 4px; }
.conflict-chip {
  background: rgba(255,107,107,0.15);
  border: 1px solid rgba(255,107,107,0.4);
  border-radius: 12px;
  padding: 2px 8px;
  font-size: 0.62rem;
}

/* ═══════════════════════════════════════════════════════════════
   BODY LAYOUT
═══════════════════════════════════════════════════════════════ */
#layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════════════════════
   GRID AREA
═══════════════════════════════════════════════════════════════ */
#grid-area {
  flex: 1;
  overflow: auto;
  padding: 10px;
}

/* Schedule Grid */
#schedule-grid {
  display: grid;
  grid-template-columns: 100px repeat(5, 1fr);
  gap: 5px;
  min-width: 700px;
}

/* Column headers */
.col-hdr {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 6px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.col-hdr .shift {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--luz);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.col-hdr .day {
  font-size: 0.58rem;
  color: var(--claro);
  opacity: 0.55;
  font-weight: 500;
}
.col-hdr-corner { background: transparent; border-color: transparent; }

/* Row headers */
.row-hdr {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  text-align: center;
}
.row-hdr .ricon { font-size: 1rem; line-height: 1; }
.row-hdr .rlabel {
  font-size: 0.56rem;
  font-weight: 700;
  color: var(--claro);
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  line-height: 1.3;
}

/* Cells */
.cell {
  background: rgba(75,132,149,0.06);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 5px;
  min-height: var(--cell-min-h);
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  transition: background var(--transition), border-color var(--transition);
}
.cell.drag-over {
  background: var(--luz-dim);
  border-color: var(--luz);
  box-shadow: inset 0 0 0 1px rgba(115,234,254,0.25);
}
.cell.highlighted {
  border-color: var(--yellow);
  background: rgba(255,200,87,0.06);
}
.cell-count {
  position: absolute;
  top: 4px; right: 5px;
  font-size: 0.55rem;
  font-weight: 700;
  color: var(--azul2);
  opacity: 0.6;
}
.cell.has-cards .cell-count { opacity: 0.8; }

/* ═══════════════════════════════════════════════════════════════
   PERSON CARDS
═══════════════════════════════════════════════════════════════ */
.card {
  background: linear-gradient(135deg, var(--azul), #2d6a80);
  border: 1px solid var(--border-med);
  border-radius: 6px;
  padding: 5px 6px;
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: grab;
  user-select: none;
  touch-action: none;
  transition: all var(--transition);
  position: relative;
}
.card:hover { border-color: var(--luz); background: linear-gradient(135deg, #2d6a80, #3a7e96); }
.card:hover .card-actions { opacity: 1; }
.card.dragging { opacity: 0.25; }
.card.conflict { background: linear-gradient(135deg, #3d1414, #5a2020); border-color: var(--red); }
.card.highlighted-card { border-color: var(--yellow); background: linear-gradient(135deg, #3d3014, #5a4a20); }
.card.search-dim { opacity: 0.2; }

.avatar {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--luz);
  color: var(--bg);
  font-size: 0.52rem;
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background var(--transition);
}
.card.conflict .avatar { background: var(--red); }
.card.highlighted-card .avatar { background: var(--yellow); }

.card-name {
  font-size: 0.66rem;
  font-weight: 600;
  color: var(--branco);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
}

/* Card action buttons (appear on hover) */
.card-actions {
  display: flex;
  gap: 2px;
  opacity: 0;
  transition: opacity var(--transition);
  flex-shrink: 0;
}
.card-btn {
  width: 18px; height: 18px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  font-size: 0.65rem;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  line-height: 1;
  padding: 0;
}
.btn-dup {
  background: rgba(92,230,92,0.15);
  color: var(--green);
}
.btn-dup:hover { background: rgba(92,230,92,0.3); }
.btn-del {
  background: rgba(255,107,107,0.15);
  color: var(--red);
}
.btn-del:hover { background: rgba(255,107,107,0.3); }

/* ═══════════════════════════════════════════════════════════════
   DUPLICATE MODE INDICATOR
═══════════════════════════════════════════════════════════════ */
#dup-indicator {
  position: fixed;
  top: 12px; left: 50%;
  transform: translateX(-50%);
  background: rgba(92,230,92,0.9);
  color: #0b1a20;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 700;
  display: none;
  z-index: 9999;
  pointer-events: none;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
#dup-indicator.show { display: block; }

/* ═══════════════════════════════════════════════════════════════
   DRAG GHOST
═══════════════════════════════════════════════════════════════ */
#drag-ghost {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  background: #2d6a80;
  border: 1.5px solid var(--luz);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--branco);
  display: none;
  white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  transform: translate(-50%, -50%) rotate(2deg);
  font-family: 'Montserrat', sans-serif;
}
#drag-ghost.dup-mode {
  border-color: var(--green);
  background: #1a3d1a;
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════════════ */
#sidebar {
  width: var(--sidebar-w);
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
#sidebar-header {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#sidebar-header h2 {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--luz);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}
#sidebar-header p {
  font-size: 0.58rem;
  color: var(--claro);
  opacity: 0.45;
}
#summary-list {
  flex: 1;
  overflow-y: auto;
  padding: 6px;
}
#summary-list::-webkit-scrollbar { width: 4px; }
#summary-list::-webkit-scrollbar-track { background: transparent; }
#summary-list::-webkit-scrollbar-thumb { background: var(--azul); border-radius: 2px; }

.summary-item {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 7px;
  border-radius: 6px;
  cursor: pointer;
  transition: background var(--transition);
  margin-bottom: 2px;
}
.summary-item:hover { background: var(--luz-dim); }
.summary-item.active { background: rgba(255,200,87,0.12); }
.summary-item.has-conflict .si-name { color: var(--red); }

.si-av {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--azul);
  color: var(--luz);
  font-size: 0.5rem;
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.summary-item.has-conflict .si-av { background: var(--red-dim); color: var(--red); }

.si-name {
  font-size: 0.66rem;
  font-weight: 600;
  color: var(--claro);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.si-badge {
  background: var(--azul);
  color: var(--luz);
  border-radius: 10px;
  padding: 1px 7px;
  font-size: 0.6rem;
  font-weight: 700;
  flex-shrink: 0;
}
.summary-item.has-conflict .si-badge {
  background: var(--red-dim);
  color: var(--red);
}

/* ═══════════════════════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════════════════════ */
#footer {
  height: var(--footer-h);
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  flex-shrink: 0;
}
.legend { display: flex; gap: 12px; flex-wrap: wrap; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 0.6rem; color: var(--claro); opacity: 0.5; }
.leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
#status-msg {
  margin-left: auto;
  font-size: 0.62rem;
  color: var(--azul2);
  transition: all 0.3s;
}
#status-msg.flash { color: var(--green); }

/* ═══════════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: 56px; right: 20px;
  background: var(--azul);
  border: 1px solid var(--luz);
  color: var(--luz);
  padding: 8px 16px;
  border-radius: var(--radius);
  font-size: 0.7rem;
  font-weight: 600;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.25s;
  pointer-events: none;
  z-index: 200;
}
#toast.show { opacity: 1; transform: translateY(0); }

/* ═══════════════════════════════════════════════════════════════
   SCROLLBARS
═══════════════════════════════════════════════════════════════ */
#grid-area::-webkit-scrollbar { width: 5px; height: 5px; }
#grid-area::-webkit-scrollbar-track { background: transparent; }
#grid-area::-webkit-scrollbar-thumb { background: var(--azul); border-radius: 3px; }

/* ═══════════════════════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════════════════════ */
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <h1>⚙ Escala Operacional</h1>
  <span class="subtitle">Revisão de Vidas · Sara Itapema · Março 2026</span>
  <div class="header-sep"></div>
  <div id="search-wrap">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="search-input" type="text" placeholder="Buscar pessoa…" autocomplete="off">
  </div>
  <button class="hbtn" onclick="App.toggleDupMode()" id="dup-btn" title="Ativar modo duplicar">⧉ Duplicar</button>
  <button class="hbtn danger" onclick="App.reset()">↺ Resetar</button>
  <button class="hbtn primary" onclick="App.export()">📋 Exportar</button>
</div>

<!-- CONFLICT BAR -->
<div id="conflict-bar">
  <strong>⚠ Conflitos:</strong>
  <div id="conflict-chips"></div>
</div>

<!-- LAYOUT -->
<div id="layout">
  <!-- GRID AREA -->
  <div id="grid-area">
    <div id="schedule-grid"></div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>📊 Resumo</h2>
      <p>Clique para destacar na grade</p>
    </div>
    <div id="summary-list"></div>
  </div>
</div>

<!-- FOOTER -->
<div id="footer">
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#c06bc7"></div>Dorm. Fem.</div>
    <div class="leg"><div class="leg-dot" style="background:#6b8ac7"></div>Dorm. Mas.</div>
    <div class="leg"><div class="leg-dot" style="background:#6bc79a"></div>Auditório</div>
    <div class="leg"><div class="leg-dot" style="background:#c7a56b"></div>Refeitório</div>
    <div class="leg"><div class="leg-dot" style="background:#c76b6b"></div>Louça</div>
    <div class="leg"><div class="leg-dot" style="background:#c7c76b"></div>Fechamento</div>
    <div class="leg"><div class="leg-dot" style="background:#5ce65c"></div>⧉ Ctrl = duplicar</div>
  </div>
  <span id="status-msg">Pronto.</span>
</div>

<!-- HELPERS -->
<div id="drag-ghost"></div>
<div id="dup-indicator">⧉ MODO DUPLICAR ATIVO</div>
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURATION
═══════════════════════════════════════════════════════════════ */
const CONFIG = {
  COLS: [
    { id: 'sex-noite',  shift: 'Noite',     day: 'Sexta' },
    { id: 'sab-manha',  shift: '7h – 14h',  day: 'Sábado' },
    { id: 'sab-tarde',  shift: '15h – 22h', day: 'Sábado' },
    { id: 'dom-manha',  shift: '7h – 14h',  day: 'Domingo' },
    { id: 'dom-tarde',  shift: '15h – 18h', day: 'Domingo' },
  ],
  ROWS: [
    { id: 'dorm-fem',   icon: '🚺', label: 'Dorm.\nFeminino' },
    { id: 'dorm-mas',   icon: '🚹', label: 'Dorm.\nMasculino' },
    { id: 'auditorio',  icon: '🎤', label: 'Auditório' },
    { id: 'refeitorio', icon: '🍴', label: 'Refeitório' },
    { id: 'louça',      icon: '🍽️', label: 'Louça' },
    { id: 'fechamento', icon: '🔒', label: 'Fechamento' },
  ],
  STORAGE_KEY: 'rv2026_schedule_v3'
};

const DEFAULT_DATA = {
  'sex-noite': {
    'louça': ['Karonlayne Staffy','Alexsandro Milke','Daniel Castilhos','Milena Vargas','Débora Castro']
  },
  'sab-manha': {
    'dorm-fem':   ['Sophya Roberts','Débora Castro','Ágatha Teló','Karonlayne Staffy'],
    'dorm-mas':   ['Edson Forte','João Maciel','Alexsandro Milke','Gabriel Salgado'],
    'auditorio':  ['Thyfani Milke','Ana Paula Milke','Thiaglyson'],
    'refeitorio': ['Camilly Busatto','Luana Fink'],
    'louça':      ['Guilherme Gabrielli','Daniel Pimentel','Thyfani Milke','Elison Perini','Laíne Fink']
  },
  'sab-tarde': {
    'dorm-fem':   ['Karyn Pimentel','Luana Machado','Josieli Quintana','Laíne Fink'],
    'dorm-mas':   ['Glademir Chiminelli','Joshua Raine','Arthur Lennart','Felyppe Fiuza'],
    'auditorio':  ['Elison Perini','Guilherme Gabrielli','Milena Vargas'],
    'refeitorio': ['Milena Vargas','Alexsandra Lima'],
    'louça':      ['Gabriel Salgado','Bruna Schonardie','Luana Fink','Joshua Raine','Felyppe Fiuza']
  },
  'dom-manha': {
    'dorm-fem':   ['Thyfani Milke','Alexsandra Lima','Camilly Busatto','Bruna Schonardie'],
    'dorm-mas':   ['Glauber Barros','Guilherme Gabrielli','Daniel Castilhos','Leandro Wolff'],
    'auditorio':  ['Débora Castro','Thiaglyson','Ana Paula Milke'],
    'refeitorio': ['Laíne Fink','Josieli Quintana'],
    'louça':      ['Guilherme Bello','Leandro Wolff','Glademir Chiminelli','Sophya Roberts','Karyn Pimentel']
  },
  'dom-tarde': {
    'dorm-fem':   ['Luana Fink','Milena Vargas','Nathieli Duarte'],
    'dorm-mas':   ['Daniel Pimentel','Guilherme Bello'],
    'auditorio':  ['Arthur Lennart','Karonlayne Staffy','Leandro Wolff'],
    'louça':      ['Ana Paula Milke','Camilly Busatto','Vinicius Vasconcelos'],
    'fechamento': ['Luana Machado','Glauber Barros','Josieli Quintana','Alexsandra Lima',
                   'Thiaglyson','Nathieli Duarte','João Maciel','Ágatha Teló']
  }
};

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
const State = (() => {
  let data = null;

  function load() {
    try {
      const saved = localStorage.getItem(CONFIG.STORAGE_KEY);
      data = saved ? JSON.parse(saved) : clone(DEFAULT_DATA);
    } catch { data = clone(DEFAULT_DATA); }
  }

  function save() {
    try { localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(data)); } catch {}
  }

  function get() { return data; }

  function getCell(slot, zone) {
    if (!data[slot]) data[slot] = {};
    if (!data[slot][zone]) data[slot][zone] = [];
    return data[slot][zone];
  }

  function addPerson(slot, zone, name) {
    const arr = getCell(slot, zone);
    if (!arr.includes(name)) arr.push(name);
    save();
  }

  function removePerson(slot, zone, name) {
    const arr = getCell(slot, zone);
    const idx = arr.indexOf(name);
    if (idx !== -1) arr.splice(idx, 1);
    save();
  }

  function movePerson(name, fromSlot, fromZone, toSlot, toZone) {
    removePerson(fromSlot, fromZone, name);
    addPerson(toSlot, toZone, name);
  }

  function duplicatePerson(name, toSlot, toZone) {
    addPerson(toSlot, toZone, name);
  }

  function reset() {
    data = clone(DEFAULT_DATA);
    save();
  }

  function getConflicts() {
    const conflicts = new Set();
    CONFIG.COLS.forEach(col => {
      const slotData = data[col.id] || {};
      const seen = {};
      CONFIG.ROWS.forEach(row => {
        (slotData[row.id] || []).forEach(name => {
          seen[name] = (seen[name] || 0) + 1;
        });
      });
      Object.entries(seen).forEach(([name, count]) => {
        if (count > 1) conflicts.add(`${name} (${col.shift} ${col.day})`);
      });
    });
    return [...conflicts];
  }

  function getConflictNames() {
    const conflicted = new Set();
    CONFIG.COLS.forEach(col => {
      const slotData = data[col.id] || {};
      const seen = {};
      CONFIG.ROWS.forEach(row => {
        (slotData[row.id] || []).forEach(name => {
          seen[name] = (seen[name] || 0) + 1;
        });
      });
      Object.entries(seen).forEach(([name, count]) => {
        if (count > 1) conflicted.add(name);
      });
    });
    return conflicted;
  }

  function getSummary() {
    const counts = {};
    Object.values(data).forEach(slotData => {
      Object.values(slotData).forEach(arr => {
        arr.forEach(name => { counts[name] = (counts[name] || 0) + 1; });
      });
    });
    return Object.entries(counts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
  }

  function isConflicted(slot, name) {
    const slotData = data[slot] || {};
    let count = 0;
    CONFIG.ROWS.forEach(row => {
      if ((slotData[row.id] || []).includes(name)) count++;
    });
    return count > 1;
  }

  return { load, get, getCell, addPerson, removePerson, movePerson, duplicatePerson, reset, getConflicts, getConflictNames, getSummary, isConflicted };
})();

function clone(o) { return JSON.parse(JSON.stringify(o)); }

/* ═══════════════════════════════════════════════════════════════
   DRAG ENGINE
═══════════════════════════════════════════════════════════════ */
const DragEngine = (() => {
  let drag = null;
  const ghost = document.getElementById('drag-ghost');
  let isTouch = false;
  let touchTimer = null;

  function start(name, slot, zone, isDup, x, y) {
    drag = { name, slot, zone, isDup };
    ghost.textContent = (isDup ? '⧉ ' : '') + name;
    ghost.className = isDup ? 'dup-mode' : '';
    ghost.style.display = 'block';
    moveGhost(x, y);
    document.getElementById('drag-ghost').style.display = 'block';
  }

  function moveGhost(x, y) {
    if (!ghost) return;
    ghost.style.left = x + 'px';
    ghost.style.top = y + 'px';
  }

  function end() {
    ghost.style.display = 'none';
    drag = null;
  }

  function getCurrent() { return drag; }
  function isActive() { return drag !== null; }

  return { start, moveGhost, end, getCurrent, isActive };
})();

/* ═══════════════════════════════════════════════════════════════
   RENDER ENGINE
═══════════════════════════════════════════════════════════════ */
const Render = (() => {
  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function buildGrid() {
    const grid = document.getElementById('schedule-grid');
    grid.innerHTML = '';

    const totalCols = CONFIG.COLS.length + 1;
    grid.style.gridTemplateColumns = `100px repeat(${CONFIG.COLS.length}, 1fr)`;

    // Corner
    const corner = el('div', 'col-hdr col-hdr-corner');
    grid.appendChild(corner);

    // Column headers
    CONFIG.COLS.forEach(col => {
      const h = el('div', 'col-hdr');
      h.innerHTML = `<span class="shift">${col.shift}</span><span class="day">${col.day}</span>`;
      grid.appendChild(h);
    });

    // Rows
    CONFIG.ROWS.forEach(row => {
      const rh = el('div', 'row-hdr');
      rh.innerHTML = `<span class="ricon">${row.icon}</span><span class="rlabel">${row.label.replace('\n', '<br>')}</span>`;
      grid.appendChild(rh);

      CONFIG.COLS.forEach(col => {
        grid.appendChild(buildCell(col.id, row.id));
      });
    });
  }

  function buildCell(slot, zone) {
    const names = State.getCell(slot, zone);
    const cell = el('div', 'cell' + (names.length ? ' has-cards' : ''));
    cell.dataset.slot = slot;
    cell.dataset.zone = zone;

    const count = el('span', 'cell-count');
    count.textContent = names.length || '';
    cell.appendChild(count);

    names.forEach(name => cell.appendChild(buildCard(name, slot, zone)));

    // Drop events
    cell.addEventListener('dragover', onCellDragOver);
    cell.addEventListener('dragleave', onCellDragLeave);
    cell.addEventListener('drop', onCellDrop);

    // Touch drop target (handled globally)
    cell._slot = slot;
    cell._zone = zone;

    return cell;
  }

  function buildCard(name, slot, zone) {
    const conflicted = State.isConflicted(slot, name);
    const card = el('div', 'card' + (conflicted ? ' conflict' : ''));
    card.draggable = true;
    card.dataset.name = name;
    card.dataset.slot = slot;
    card.dataset.zone = zone;

    card.innerHTML = `
      <div class="avatar">${initials(name)}</div>
      <span class="card-name" title="${name}">${name}</span>
      <div class="card-actions">
        <button class="card-btn btn-dup" title="Duplicar para outra célula">⧉</button>
        <button class="card-btn btn-del" title="Remover desta célula">✕</button>
      </div>`;

    // Desktop drag
    card.addEventListener('dragstart', e => {
      const isDup = e.ctrlKey || e.metaKey || App.dupMode;
      DragEngine.start(name, slot, zone, isDup, e.clientX, e.clientY);
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = isDup ? 'copy' : 'move';
      e.dataTransfer.setDragImage(new Image(), 0, 0);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      DragEngine.end();
    });

    // Duplicate button
    card.querySelector('.btn-dup').addEventListener('click', e => {
      e.stopPropagation();
      App.startDupFromButton(name, slot, zone);
    });

    // Delete button
    card.querySelector('.btn-del').addEventListener('click', e => {
      e.stopPropagation();
      State.removePerson(slot, zone, name);
      Render.refresh();
      setStatus(`Removido: ${name}`);
    });

    // Touch drag
    card.addEventListener('touchstart', onCardTouchStart, { passive: false });

    return card;
  }

  function refresh() {
    buildGrid();
    updateConflictBar();
    updateSummary();
    applySearch();
    applyHighlight();
  }

  function updateConflictBar() {
    const conflicts = State.getConflicts();
    const bar = document.getElementById('conflict-bar');
    const chips = document.getElementById('conflict-chips');
    chips.innerHTML = '';

    if (conflicts.length) {
      bar.classList.add('show');
      conflicts.forEach(c => {
        const chip = el('span', 'conflict-chip');
        chip.textContent = c;
        chips.appendChild(chip);
      });
    } else {
      bar.classList.remove('show');
    }
  }

  function updateSummary() {
    const list = document.getElementById('summary-list');
    const summary = State.getSummary();
    const conflictNames = State.getConflictNames();
    const query = document.getElementById('search-input').value.toLowerCase();
    const activeHighlight = UI.highlighted;

    list.innerHTML = '';
    summary.forEach(([name, count]) => {
      if (query && !name.toLowerCase().includes(query)) return;

      const item = el('div', 'summary-item' +
        (conflictNames.has(name) ? ' has-conflict' : '') +
        (activeHighlight === name ? ' active' : ''));

      item.innerHTML = `
        <div class="si-av">${initials(name)}</div>
        <span class="si-name" title="${name}">${name}</span>
        <span class="si-badge">${count}</span>`;

      item.addEventListener('click', () => UI.toggleHighlight(name));
      list.appendChild(item);
    });
  }

  function el(tag, cls) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    return e;
  }

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  return { buildGrid, buildCell, buildCard, refresh, updateConflictBar, updateSummary, initials };
})();

/* ═══════════════════════════════════════════════════════════════
   DRAG HANDLERS
═══════════════════════════════════════════════════════════════ */
function onCellDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = App.dupMode ? 'copy' : 'move';
  this.classList.add('drag-over');
  DragEngine.moveGhost(e.clientX, e.clientY);
}

function onCellDragLeave(e) {
  if (!this.contains(e.relatedTarget)) this.classList.remove('drag-over');
}

function onCellDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  const drag = DragEngine.getCurrent();
  if (!drag) return;

  const toSlot = this.dataset.slot;
  const toZone = this.dataset.zone;

  if (drag.slot === toSlot && drag.zone === toZone) return;

  if (drag.isDup) {
    State.duplicatePerson(drag.name, toSlot, toZone);
    setStatus(`⧉ Duplicado: ${drag.name} → ${toZone}`);
  } else {
    State.movePerson(drag.name, drag.slot, drag.zone, toSlot, toZone);
    setStatus(`Movido: ${drag.name} → ${toZone}`);
  }

  Render.refresh();
}

document.addEventListener('dragover', e => {
  DragEngine.moveGhost(e.clientX, e.clientY);
});

/* ═══════════════════════════════════════════════════════════════
   TOUCH DRAG
═══════════════════════════════════════════════════════════════ */
let touchDrag = null;

function onCardTouchStart(e) {
  const card = e.currentTarget;
  touchDrag = {
    name: card.dataset.name,
    slot: card.dataset.slot,
    zone: card.dataset.zone,
    isDup: App.dupMode
  };
  const ghost = document.getElementById('drag-ghost');
  ghost.textContent = (App.dupMode ? '⧉ ' : '') + card.dataset.name;
  ghost.className = App.dupMode ? 'dup-mode' : '';
  ghost.style.display = 'block';
  card.classList.add('dragging');
  e.preventDefault();
}

document.addEventListener('touchmove', e => {
  if (!touchDrag) return;
  e.preventDefault();
  const t = e.touches[0];
  document.getElementById('drag-ghost').style.left = t.clientX + 'px';
  document.getElementById('drag-ghost').style.top = t.clientY + 'px';
  document.querySelectorAll('.cell.drag-over').forEach(c => c.classList.remove('drag-over'));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const cell = el && el.closest('.cell[data-slot]');
  if (cell) cell.classList.add('drag-over');
}, { passive: false });

document.addEventListener('touchend', e => {
  if (!touchDrag) return;
  document.getElementById('drag-ghost').style.display = 'none';
  document.querySelectorAll('.card.dragging').forEach(c => c.classList.remove('dragging'));
  document.querySelectorAll('.cell.drag-over').forEach(c => c.classList.remove('drag-over'));

  const t = e.changedTouches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const cell = el && el.closest('.cell[data-slot]');

  if (cell) {
    const toSlot = cell.dataset.slot;
    const toZone = cell.dataset.zone;
    if (!(toSlot === touchDrag.slot && toZone === touchDrag.zone)) {
      if (touchDrag.isDup) {
        State.duplicatePerson(touchDrag.name, toSlot, toZone);
        setStatus(`⧉ Duplicado: ${touchDrag.name}`);
      } else {
        State.movePerson(touchDrag.name, touchDrag.slot, touchDrag.zone, toSlot, toZone);
        setStatus(`Movido: ${touchDrag.name}`);
      }
      Render.refresh();
    }
  }
  touchDrag = null;
});

/* ═══════════════════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════════════════ */
const UI = (() => {
  let highlighted = null;

  function toggleHighlight(name) {
    highlighted = highlighted === name ? null : name;
    applyHighlight();
    Render.updateSummary();
  }

  function clearHighlight() {
    highlighted = null;
    applyHighlight();
    Render.updateSummary();
  }

  return { get highlighted() { return highlighted; }, toggleHighlight, clearHighlight };
})();

function applyHighlight() {
  const name = UI.highlighted;
  document.querySelectorAll('.card').forEach(card => {
    if (!name) {
      card.classList.remove('highlighted-card');
    } else {
      card.classList.toggle('highlighted-card', card.dataset.name === name);
    }
  });
  document.querySelectorAll('.cell').forEach(cell => {
    if (!name) {
      cell.classList.remove('highlighted');
    } else {
      const has = Array.from(cell.querySelectorAll('.card')).some(c => c.dataset.name === name);
      cell.classList.toggle('highlighted', has);
    }
  });
}

function applySearch() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  document.querySelectorAll('.card').forEach(card => {
    if (!q) {
      card.classList.remove('search-dim');
    } else {
      card.classList.toggle('search-dim', !card.dataset.name.toLowerCase().includes(q));
    }
  });
}

/* ═══════════════════════════════════════════════════════════════
   STATUS & TOAST
═══════════════════════════════════════════════════════════════ */
let statusTimer = null;
function setStatus(msg) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.classList.add('flash');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => {
    el.classList.remove('flash');
    el.textContent = 'Pronto.';
  }, 2500);
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ═══════════════════════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════════════════════ */
const App = (() => {
  let dupMode = false;
  let dupSource = null;

  function toggleDupMode() {
    dupMode = !dupMode;
    const btn = document.getElementById('dup-btn');
    const ind = document.getElementById('dup-indicator');
    if (dupMode) {
      btn.style.background = 'rgba(92,230,92,0.15)';
      btn.style.borderColor = '#5ce65c';
      btn.style.color = '#5ce65c';
      ind.classList.add('show');
      setStatus('Modo duplicar ATIVO. Arraste para duplicar.');
    } else {
      btn.style.background = '';
      btn.style.borderColor = '';
      btn.style.color = '';
      ind.classList.remove('show');
      setStatus('Modo duplicar desativado.');
    }
  }

  function startDupFromButton(name, slot, zone) {
    showToast(`Arraste ${name.split(' ')[0]} para a célula destino em modo ⧉`);
    if (!dupMode) toggleDupMode();
    setStatus(`Selecione destino para duplicar ${name.split(' ')[0]}`);
  }

  function reset() {
    if (!confirm('Resetar toda a escala para o estado original?')) return;
    State.reset();
    UI.clearHighlight();
    Render.refresh();
    setStatus('Escala resetada.');
  }

  function exportSchedule() {
    const SLOT_LABELS = {
      'sex-noite':  'SEXTA · NOITE',
      'sab-manha':  'SÁBADO · 7h–14h',
      'sab-tarde':  'SÁBADO · 15h–22h',
      'dom-manha':  'DOMINGO · 7h–14h',
      'dom-tarde':  'DOMINGO · 15h–18h'
    };
    const ZONE_LABELS = {
      'dorm-fem': 'Dorm. Feminino', 'dorm-mas': 'Dorm. Masculino',
      'auditorio': 'Auditório', 'refeitorio': 'Refeitório',
      'louça': 'Louça', 'fechamento': 'Fechamento'
    };
    let out = 'ESCALA — REVISÃO DE VIDAS 2026\n';
    out += '═'.repeat(36) + '\n\n';
    CONFIG.COLS.forEach(col => {
      const slotData = State.get()[col.id] || {};
      const lines = [];
      CONFIG.ROWS.forEach(row => {
        const names = slotData[row.id] || [];
        if (names.length) lines.push(`  ${ZONE_LABELS[row.id]}: ${names.join(', ')}`);
      });
      if (lines.length) { out += `▸ ${SLOT_LABELS[col.id]}\n${lines.join('\n')}\n\n`; }
    });
    out += '─'.repeat(36) + '\n📊 RESUMO\n';
    State.getSummary().forEach(([name, count]) => {
      out += `  ${name} (${count}x)\n`;
    });
    const conflicts = State.getConflicts();
    if (conflicts.length) {
      out += '\n⚠ CONFLITOS\n';
      conflicts.forEach(c => { out += `  ${c}\n`; });
    }
    navigator.clipboard.writeText(out).then(() => showToast('✓ Escala copiada!'));
  }

  return {
    get dupMode() { return dupMode; },
    toggleDupMode,
    startDupFromButton,
    reset,
    export: exportSchedule
  };
})();

/* ═══════════════════════════════════════════════════════════════
   EVENTS
═══════════════════════════════════════════════════════════════ */
document.getElementById('search-input').addEventListener('input', () => {
  applySearch();
  Render.updateSummary();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    UI.clearHighlight();
    document.getElementById('search-input').value = '';
    applySearch();
    Render.updateSummary();
  }
});

/* ═══════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════ */
State.load();
Render.refresh();
setStatus('Escala carregada. ' + (localStorage.getItem(CONFIG.STORAGE_KEY) ? '(Dado salvo restaurado)' : '(Dados padrão)'));
</script>
